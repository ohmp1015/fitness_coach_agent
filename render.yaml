# render.yaml - Render Blueprint
# Place this in your repo root for auto-deploy on Render

services:
  # Backend API
  - type: web
    name: fitcoach-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm install transcript
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
    disk:
      name: fitcoach-data
      mountPath: /app/backend/data
      sizeGB: 1

